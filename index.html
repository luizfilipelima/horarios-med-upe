<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      (function(){
        var p = location.pathname + location.search;
        var start = (p.startsWith('/t/') || p === '/' || p.startsWith('/login')) ? p : '/';
        var link = document.createElement('link');
        link.rel = 'manifest';
        link.href = '/api/manifest?start_url=' + encodeURIComponent(start);
        document.head.appendChild(link);
      })();
    </script>
    <link rel="apple-touch-icon" href="/icon-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f8f7f5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Gradly</title>
    <meta name="description" content="Gradly – App de horários para alunos, delegados e administradores." />
    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Gradly" />
    <meta property="og:description" content="Gradly – App de horários para alunos, delegados e administradores." />
    <meta property="og:image" content="{{SITE_URL}}/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:url" content="{{SITE_URL}}/" />
    <meta property="og:site_name" content="Gradly" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Gradly" />
    <meta name="twitter:description" content="Gradly – App de horários para alunos, delegados e administradores." />
    <meta name="twitter:image" content="{{SITE_URL}}/og-image.png" />
    <style>
      #root { min-height: 100vh; min-width: 100%; display: flex; align-items: center; justify-content: center; }
      #root:empty::after { content: ''; }
    </style>
    <script>
      (function() {
        var key = 'horarios-theme';
        var stored = localStorage.getItem(key);
        var dark = stored === 'dark' || (stored !== 'light' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.classList.toggle('dark', dark);
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', dark ? '#09090b' : '#f8f7f5');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx" fetchpriority="high"></script>
  </body>
</html>
